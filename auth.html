<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RoboTech Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 2rem;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo-icon { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
        .auth-header h1 { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-secondary); font-size: 0.9rem; }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition-fast);
        }

        .auth-tab.active {
            background: var(--accent-gradient);
            color: white;
        }

        .auth-form { display: none; }
        .auth-form.active { display: flex; flex-direction: column; gap: 1rem; }

        .auth-btn {
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
        }

        .auth-error {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.2rem;
        }

        .auth-success {
            color: #4ade80;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.2rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .auth-footer a {
            color: var(--accent-secondary);
            text-decoration: none;
        }

        .auth-footer a:hover { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-icon">🤖</span>
                <h1>RoboTech Store</h1>
                <p>Sign in to your account or create a new one</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-form="login">Sign In</button>
                <button class="auth-tab" data-form="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-btn auth-btn">Sign In</button>
                <p class="auth-error" id="loginError"></p>
            </form>

            <!-- Signup Form -->
            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="cta-btn auth-btn">Create Account</button>
                <p class="auth-error" id="signupError"></p>
                <p class="auth-success" id="signupSuccess"></p>
            </form>

            <div class="auth-footer">
                <a href="index.html">← Back to Store</a>
            </div>
        </div>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Tabs
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.form}Form`).classList.add('active');
            });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('robotech_token', data.token);
                    localStorage.setItem('robotech_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = data.error;
                }
            } catch {
                errorEl.textContent = 'Connection failed';
            }
        });

        // Signup
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorEl = document.getElementById('signupError');
            const successEl = document.getElementById('signupSuccess');

            errorEl.textContent = '';
            successEl.textContent = '';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('robotech_token', data.token);
                    localStorage.setItem('robotech_user', JSON.stringify(data.user));
                    successEl.textContent = 'Account created! Redirecting...';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    errorEl.textContent = data.error;
                }
            } catch {
                errorEl.textContent = 'Connection failed';
            }
        });
    </script>
</body>
</html>
