<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - RoboTech Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="product.css">
</head>

<body>
    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">RoboTech</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#products" class="nav-link">Products</a></li>
                <li><a href="index.html#stats" class="nav-link">About</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button class="icon-btn" id="cartBtn" aria-label="Shopping Cart">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="badge" id="cartBadge">0</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Toggle Menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Product Detail Page -->
    <main class="product-detail-page" id="productDetailPage">
        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="index.html">Home</a>
            <span>/</span>
            <a href="index.html#products">Products</a>
            <span>/</span>
            <span class="breadcrumb-current" id="breadcrumbName">Loading...</span>
        </div>

        <!-- Product Main Section -->
        <section class="product-detail-main">
            <!-- Image Gallery -->
            <div class="product-gallery">
                <div class="gallery-main" id="galleryMain">
                    <img id="galleryMainImg" src="" alt="Product Image">
                    <button class="gallery-wishlist-btn" id="detailWishlistBtn">♡</button>
                </div>
                <div class="gallery-thumbs" id="galleryThumbs"></div>
            </div>

            <!-- Product Info -->
            <div class="product-detail-info">
                <div class="product-detail-badge" id="detailBadge"></div>
                <h1 class="product-detail-name" id="detailName"></h1>
                <div class="product-detail-brand" id="detailBrand"></div>
                <div class="product-detail-rating">
                    <div class="star-rating" id="starRating">
                        <span class="star filled" data-value="1">★</span>
                        <span class="star filled" data-value="2">★</span>
                        <span class="star filled" data-value="3">★</span>
                        <span class="star filled" data-value="4">★</span>
                        <span class="star filled" data-value="5">★</span>
                    </div>
                    <span class="rating-count">(128 reviews)</span>
                </div>
                <p class="product-detail-description" id="detailDescription"></p>
                <div class="product-detail-price" id="detailPrice"></div>

                <div class="product-detail-features" id="detailFeatures"></div>

                <div class="product-detail-actions">
                    <div class="quantity-selector">
                        <button class="qty-btn" id="qtyMinus">−</button>
                        <span class="qty-value" id="qtyValue">1</span>
                        <button class="qty-btn" id="qtyPlus">+</button>
                    </div>
                    <button class="cta-btn add-to-cart-detail" id="detailAddToCart">Add to Cart</button>
                </div>

                <div class="product-detail-meta">
                    <div class="meta-item">
                        <span class="meta-icon">🚚</span>
                        <span>Free Shipping</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-icon">🛡️</span>
                        <span>2 Year Warranty</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-icon">🔄</span>
                        <span>30-Day Returns</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Specs Table -->
        <section class="product-specs-section">
            <h2>Technical Specifications</h2>
            <div class="specs-table" id="specsTable"></div>
        </section>

        <!-- Related Products -->
        <section class="related-products-section">
            <h2>Related Products</h2>
            <div class="related-products-grid" id="relatedProducts"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 RoboTech Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="product-detail.js"></script>
</body>

</html>
