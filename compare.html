<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Drones - RoboTech Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="compare.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo" style="text-decoration:none;">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">RoboTech</span>
            </a>
            <div class="nav-actions">
                <a href="index.html" class="icon-btn" aria-label="Back to Store">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="compare-page">
        <div class="compare-header">
            <h1>Compare Drones</h1>
            <p>Select 2-3 drones to compare specifications side by side</p>
        </div>

        <!-- Product Selector -->
        <div class="compare-selector">
            <div class="compare-slot" id="slot1">
                <button class="compare-slot-btn" onclick="openSelector(0)">
                    <span class="slot-plus">+</span>
                    <span class="slot-text">Select Drone</span>
                </button>
            </div>
            <div class="compare-vs">VS</div>
            <div class="compare-slot" id="slot2">
                <button class="compare-slot-btn" onclick="openSelector(1)">
                    <span class="slot-plus">+</span>
                    <span class="slot-text">Select Drone</span>
                </button>
            </div>
            <div class="compare-vs">VS</div>
            <div class="compare-slot" id="slot3">
                <button class="compare-slot-btn" onclick="openSelector(2)">
                    <span class="slot-plus">+</span>
                    <span class="slot-text">Select Drone</span>
                </button>
            </div>
        </div>

        <!-- Comparison Table -->
        <div class="compare-table-wrapper" id="compareTable" style="display:none;">
            <table class="compare-table" id="compareTableBody">
            </table>
        </div>

        <!-- Selector Modal -->
        <div class="selector-overlay" id="selectorOverlay">
            <div class="selector-modal">
                <div class="selector-header">
                    <h3>Choose a Drone</h3>
                    <button class="modal-close" onclick="closeSelector()">×</button>
                </div>
                <div class="selector-grid" id="selectorGrid"></div>
            </div>
        </div>
    </main>

    <script src="compare.js"></script>
</body>
</html>
